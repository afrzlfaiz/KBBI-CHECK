<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBBI Word Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-box {
            padding: 20px;
            border-radius: 8px;
        }

        .result-box.baku {
            background: #d4edda;
            border: 2px solid #28a745;
        }

        .result-box.tidak-baku {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }

        .result-box h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .result-box.baku h3 {
            color: #155724;
        }

        .result-box.tidak-baku h3 {
            color: #721c24;
        }

        .word-list {
            list-style: none;
        }

        .word-list li {
            padding: 8px 12px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 KBBI Checker</h1>
        <p class="subtitle">Periksa kata baku sesuai Kamus Besar Bahasa Indonesia</p>
        
        <textarea 
            id="wordsInput" 
            placeholder="Masukkan kata-kata, pisahkan dengan newline atau koma...
Contoh:
makan
minum
jalan
atau: makan, minum, jalan"
        ></textarea>

        <div class="btn-container">
            <button id="checkBtn" onclick="checkWords()">🔍 Periksa Kata</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Memeriksa kata...</p>
        </div>

        <div class="results" id="results">
            <div class="stats" id="stats"></div>
            <div class="result-grid">
                <div class="result-box baku">
                    <h3>✅ Kata Baku (<span id="bakuCount">0</span>)</h3>
                    <ul class="word-list" id="bakuList"></ul>
                </div>
                <div class="result-box tidak-baku">
                    <h3>❌ Tidak Ditemukan (<span id="tidakBakuCount">0</span>)</h3>
                    <ul class="word-list" id="tidakBakuList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function checkWords() {
            const text = document.getElementById('wordsInput').value.trim();
            
            if (!text) {
                alert('Masukkan kata-kata yang ingin diperiksa!');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const btn = document.getElementById('checkBtn');

            loading.classList.add('show');
            results.classList.remove('show');
            btn.disabled = true;

            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                document.getElementById('bakuCount').textContent = data.baku.length;
                document.getElementById('tidakBakuCount').textContent = data.tidak_baku.length;

                const bakuList = document.getElementById('bakuList');
                const tidakBakuList = document.getElementById('tidakBakuList');

                bakuList.innerHTML = data.baku.map(word => `<li>${word}</li>`).join('');
                tidakBakuList.innerHTML = data.tidak_baku.map(word => `<li>${word}</li>`).join('');

                const total = data.baku.length + data.tidak_baku.length;
                document.getElementById('stats').textContent = 
                    `Total: ${total} kata | Baku: ${data.baku.length} | Tidak baku: ${data.tidak_baku.length}`;

                results.classList.add('show');
            } catch (error) {
                alert('Terjadi kesalahan saat memeriksa kata. Coba lagi!');
                console.error(error);
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        }

        // Allow Ctrl+Enter to check
        document.getElementById('wordsInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                checkWords();
            }
        });
    </script>
</body>
</html>
